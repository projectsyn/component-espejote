apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: espejote-auto-roles-2
    managedresource.espejote.io/name: auto-roles-2
  name: espejote-auto-roles-2
  namespace: my-namespace
---
apiVersion: espejote.io/v1alpha1
kind: ManagedResource
metadata:
  labels:
    app.kubernetes.io/name: auto-roles-2
  name: auto-roles-2
  namespace: my-namespace
spec:
  context:
    - name: namespaces
      resource:
        apiVersion: v1
        kind: Namespace
        labelSelector:
          matchExpressions:
            - key: managedresource-sample.espejote.io/inject-cm
              operator: Exists
    - name: configmap
      resource:
        apiVersion: v1
        kind: ConfigMap
  serviceAccountRef:
    name: espejote-auto-roles-2
  triggers:
    - name: configmap
      watchResource:
        apiVersion: v1
        kind: ConfigMap
        name: cm-to-inject
    - name: secret
      watchResource:
        apiVersion: v1
        kind: Secret
        namespace: my-namespace
    - name: pod
      watchResource:
        apiVersion: v1
        kind: Pod
        namespace: other-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: esp:mr:auto-roles-2:trg:configmap
  namespace: my-namespace
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: esp:mr:auto-roles-2:trg:secret
  namespace: my-namespace
rules:
  - apiGroups:
      - ''
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: esp:mr:my-namespace:auto-roles-2:trg:pod
  namespace: other-namespace
rules:
  - apiGroups:
      - ''
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: esp:mr:my-namespace:auto-roles-2:ctx:namespaces
rules:
  - apiGroups:
      - ''
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: esp:mr:auto-roles-2:ctx:configmap
  namespace: my-namespace
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: esp:mr:auto-roles-2:trg:configmap
  namespace: my-namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: esp:mr:auto-roles-2:trg:configmap
subjects:
  - kind: ServiceAccount
    name: espejote-auto-roles-2
    namespace: my-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: esp:mr:auto-roles-2:trg:secret
  namespace: my-namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: esp:mr:auto-roles-2:trg:secret
subjects:
  - kind: ServiceAccount
    name: espejote-auto-roles-2
    namespace: my-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: esp:mr:my-namespace:auto-roles-2:trg:pod
  namespace: other-namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: esp:mr:my-namespace:auto-roles-2:trg:pod
subjects:
  - kind: ServiceAccount
    name: espejote-auto-roles-2
    namespace: my-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: esp:mr:my-namespace:auto-roles-2:ctx:namespaces
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: esp:mr:my-namespace:auto-roles-2:ctx:namespaces
subjects:
  - kind: ServiceAccount
    name: espejote-auto-roles-2
    namespace: my-namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: esp:mr:auto-roles-2:ctx:configmap
  namespace: my-namespace
roleRef:
  apiGroup: rbac.authorization.k8s.io
